services:
  db:
    image: postgres:16-alpine
    container_name: commai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-commai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-commai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-commai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
